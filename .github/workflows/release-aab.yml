name: Build & Release AAB (Play Store)

on:
  workflow_dispatch:
  push:
    tags:
      - 'v*'

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-release-aab:
    name: Build signed release AAB
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v6
        with:
          gradle-version: '8.14.4'

      - name: Decode keystore from secret
        run: |
          mkdir -p app/keystore
          echo "${{ secrets.KEYSTORE_BASE64 }}" | base64 --decode > app/keystore/release.keystore

      - name: Build release AAB
        env:
          KEYSTORE_PATH: keystore/release.keystore
          KEYSTORE_PASSWORD: ${{ secrets.KEYSTORE_PASSWORD }}
          KEY_ALIAS: ${{ secrets.KEY_ALIAS }}
          KEY_PASSWORD: ${{ secrets.KEY_PASSWORD }}
        run: gradle bundleRelease --no-daemon

      - name: Upload release AAB
        uses: actions/upload-artifact@v6
        with:
          name: picto-play-release-aab
          path: app/build/outputs/bundle/release/app-release.aab

      - name: Upload mapping file (for crash deobfuscation)
        uses: actions/upload-artifact@v6
        with:
          name: picto-play-mapping
          path: app/build/outputs/mapping/release/mapping.txt
