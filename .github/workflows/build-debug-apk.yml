name: Build debug APK

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - work
      - main
      - v3

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Setup Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.6'

      - name: Build v3 debug APK
        run: gradle :app-v3:assembleDebug --stacktrace --info

      - name: Upload v3 APK
        uses: actions/upload-artifact@v4
        with:
          name: speak-help-v3-debug
          path: app-v3/build/outputs/apk/debug/app-v3-debug.apk
