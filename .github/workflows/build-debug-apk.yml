name: Build debug APK

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - work
      - main
      - v3

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  build-debug-apk:
    name: Build debug APK
    runs-on: ubuntu-24.04

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Java
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: '17'

      - name: Set up Gradle
        uses: gradle/actions/setup-gradle@v4
        with:
          gradle-version: '8.11.1'

      - name: Build v2 debug APK
        run: gradle :app:assembleDebug --no-daemon

      - name: Build v3 debug APK
        run: gradle :app-v3:assembleDebug --no-daemon

      - name: Upload v2 APK
        uses: actions/upload-artifact@v4
        with:
          name: speak-help-v2-debug
          path: app/build/outputs/apk/debug/app-debug.apk

      - name: Upload v3 APK
        uses: actions/upload-artifact@v4
        with:
          name: speak-help-v3-debug
          path: app-v3/build/outputs/apk/debug/app-v3-debug.apk
