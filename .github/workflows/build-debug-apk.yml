name: Build debug APK

on:
  workflow_dispatch:
  push:
    branches:
      - v3

jobs:
  build-v3:
    name: Build v3 APK
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'

      - name: Build with Gradle
        uses: gradle/actions/setup-gradle@v3
        with:
          gradle-version: '8.5'
          cache-disabled: true

      - name: Build v3 debug APK
        run: |
          gradle :app-v3:assembleDebug --stacktrace --info --no-daemon > build_output.txt 2>&1 || {
            git config --global user.name "Actions Bot"
            git config --global user.email "bot@github.com"
            git checkout -b build-logs
            git add build_output.txt
            git commit -m "Build failure logs"
            git push -f https://x-access-token:${{ secrets.GITHUB_TOKEN }}@github.com/sidj-pd/Asd-app.git build-logs
            exit 1
          }

      - name: Upload v3 APK
        uses: actions/upload-artifact@v4
        with:
          name: speak-help-v3-debug
          path: app-v3/build/outputs/apk/debug/app-v3-debug.apk
